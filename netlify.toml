[build]
  command = "npm install && npm run build"
  functions = "netlify/functions"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[functions."fetch-site-audit"]
  timeout = 26

[functions."sync-gymmaster-to-ac"]
  timeout = 60
  schedule = "0 18 * * *"

[functions."ai-seo-enhanced"]
  timeout = 26

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
